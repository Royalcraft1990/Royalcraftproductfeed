name: Generate Ufurnish Product Feed

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate feed CSV
        run: python generate_feed.py
      - name: Commit and push updated feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ufurnish_feed.csv
          git diff --staged --quiet || git commit -m "Auto-update ufurnish feed $(date +'%Y-%m-%d')"
          git push
